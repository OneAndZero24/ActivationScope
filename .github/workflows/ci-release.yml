# CI Release — build sdist and publish to PyPI (TestPyPI on `[testpypi]` push)
#
# For a PyTorch C++ extension the canonical distribution model is **sdist**.  pip compiles
# the C++ against the user's local torch at install time (same as torchvision / torchaudio).
# No Docker, no manylinux, no wheels needed here — `.docker/Dockerfile` is only used by
# `ci-test.yml` for the multi-version test matrix.

name: CI Release

on:
  push:
    tags:
      - "v*"
    branches:
      - "*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If yes, build only — do not publish to PyPI."
        default: no
        required: false
        type: boolean

jobs:
  # ── Build sdist on the runner (no Docker needed for source tarball) ────
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Generate pyproject.toml
        run: python utils/generate-pyproject.py --matrix matrix.yml

      - name: Build sdist
        run: |
          python -m pip install build
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*.tar.gz

  # ── Publish (only on tag or manual) ─────────────────────────────
  publish-to-pypi:
    needs: [build-sdist]
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (stable)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          repository_url: https://upload.pypi.org/legacy/
          verbose: true

      - name: Publish to TestPyPI
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') && contains(github.event.head_commit.message, '[testpypi]')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository_url: https://test.pypi.org/legacy/
          verbose: true

      - name: Dry-run summary (no publishing)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        run: |
          echo "DRY-RUN — sdist downloaded in dist/ but NOT published."
          ls -lR dist/
