name: activationscope
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # --- Core runtime (set to 3.8 for minimum-compatible builds) ---
  - python=3.10
  - pip

  # --- C++ / build toolchain (V2: expanded session_manager surface area) ---
  - pybind11
  - setuptools>=68
  - wheel
  - build

  # --- Testing ---
  - pytest>=7.0
  - pytest-cov
  - pytest-benchmark

  # --- Dev utilities ---
  - ruff
  - pyyaml
  - psutil

  # --- PyTorch (CPU for local dev; CI Docker uses CUDA wheels) ---
  # To switch to CUDA for GPU development, replace "cpu" with your CUDA version:
  #   e.g. torch==2.5.1+cu121 --index-url https://download.pytorch.org/whl/cu121
  - pip:
    - torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu
    - torchvision==0.20.1 --index-url https://download.pytorch.org/whl/cpu
